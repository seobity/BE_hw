<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>무작위로 비밀번호를 생성해봅시다!</h1>
    
    <form action="{% url 'password:result'%}" method="get">

    <h3>비밀번호 길이를 입력하세요.</h3>
    <input type="number" name="length">
    <br><br>
    <input type="checkbox" name="upper" /> 영어 대문자 포함
    <br><br>
    <input type="checkbox" name="lower" /> 영어 소문자 포함
    <br><br>
    <input type="checkbox" name="digits" /> 숫자 포함
    <br><br>
    <input type="checkbox" name="special" /> 특수문자 포함 
    <br><br>
    <button type="submit">비밀번호 생성</button>


    </form>

</body>
</html>
